jobs:
  sync-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4

      - name: Build Aster
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          # 1. Get latest tag from private repo
          LATEST_PRIVATE_TAG=$(gh api repos/Pratech1015/Aster/releases/latest --jq .tag_name)
          
          # 2. Check local version.txt
          CURRENT_VERSION=$(cat version.txt)

          if [ "$LATEST_PRIVATE_TAG" != "$CURRENT_VERSION" ]; then
            echo "New version detected: $LATEST_PRIVATE_TAG"
            
            # 3. Create release in public repo
            gh release create "$LATEST_PRIVATE_TAG" --notes "Built update $LATEST_PRIVATE_TAG"
            
            # 4. Download and attach assets from private repo
            gh release download "$LATEST_PRIVATE_TAG" -R Pratech1015/Aster -p "com.aster.regolith.flatpak"
            gh release download "$LATEST_PRIVATE_TAG" -R Pratech1015/Aster -p "Aster.Browser.Windows.Portable.exe"
            gh release upload "$LATEST_PRIVATE_TAG" com.aster.regolith.flatpak
            gh release upload "$LATEST_PRIVATE_TAG" Aster.Browser.Windows.Portable.exe
            
            # 5. Update local version file
            echo "$LATEST_PRIVATE_TAG" > version.txt
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add version.txt
            git commit -m "chore: update version to $LATEST_PRIVATE_TAG"
            git push
          else
            echo "Versions are in sync."
          fi
