on:
  schedule:
    - cron: 30 * * * *
  # This enables the manual "Run workflow" button in the UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'
jobs:
  sync-releases:
    runs-on: ubuntu-latest 
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4

      - name: Build Aster
        env:
          GH_TOKEN: ${{ secrets.PAT }}   # ensure 'PAT' secret exists and has 'repo' scope
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Error: GH_TOKEN (secrets.PAT) is not set. Add a PAT with repo access."
            exit 1
          fi

          # Get the latest release tag (use gh release list which returns empty instead of 404)
          LATEST_PRIVATE_TAG=$(gh release list -R Pratech1015/Aster --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)

          if [ -z "$LATEST_PRIVATE_TAG" ]; then
            echo "No releases found in Pratech1015/Aster. Nothing to sync."
            exit 0
          fi

          echo "Latest private tag: $LATEST_PRIVATE_TAG"

          # Check local version
          CURRENT_VERSION=$(cat version.txt)
          echo "Current local version: $CURRENT_VERSION"

          if [ "$LATEST_PRIVATE_TAG" != "$CURRENT_VERSION" ]; then
            echo "New version detected: $LATEST_PRIVATE_TAG"

            # Create release in this repo (current repo)
            gh release create "$LATEST_PRIVATE_TAG" --notes "Built update $LATEST_PRIVATE_TAG"

            # Download assets from private repo and upload to this repo's release
            gh release download "$LATEST_PRIVATE_TAG" -R Pratech1015/Aster -p "com.aster.regolith.flatpak"
            gh release download "$LATEST_PRIVATE_TAG" -R Pratech1015/Aster -p "Aster.Browser.Windows.Portable.exe"
            gh release upload "$LATEST_PRIVATE_TAG" com.aster.regolith.flatpak
            gh release upload "$LATEST_PRIVATE_TAG" Aster.Browser.Windows.Portable.exe

            # Update version.txt and push
            echo "$LATEST_PRIVATE_TAG" > version.txt
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add version.txt
            git commit -m "chore: update version to $LATEST_PRIVATE_TAG" || echo "No changes to commit"
            git push
          else
            echo "Versions are in sync."
          fi
